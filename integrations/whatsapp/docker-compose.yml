version: '3.8'

services:
  wa-webhook:
    build: .
    ports:
      - "8086:8086"
    environment:
      - WASENDER_SESSION_KEY=${WASENDER_SESSION_KEY}
      - WASENDER_WEBHOOK_SECRET=${WASENDER_WEBHOOK_SECRET}
    volumes:
      - ../../shared/logs:/app/logs
      - ../../agents/whatsapp-bridge:/app/agent
    restart: unless-stopped
    command: uvicorn wa-webhook-handler:app --host 0.0.0.0 --port 8086
